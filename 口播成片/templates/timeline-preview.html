<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{PROJECT_TITLE}} 时间线预览</title>
<style>
:root {
  color-scheme: light;
  --bg: #f5f1e8;
  --panel: #fffdf8;
  --panel-2: #fbf7ee;
  --ink: #171714;
  --muted: #666158;
  --subtle: #8b8378;
  --line: #d7cdbd;
  --line-strong: #bfb19d;
  --accent: #145f56;
  --accent-weak: #e6f0ed;
  --warn: #a9442b;
  --shadow: 0 12px 34px rgba(28, 22, 14, .08);
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  min-height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--ink);
  letter-spacing: 0;
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  border-bottom: 1px solid var(--line);
  background: rgba(245, 241, 232, .94);
  backdrop-filter: blur(12px);
}
.topbar-inner {
  max-width: 1500px;
  margin: 0 auto;
  padding: 16px 24px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
}
.kicker {
  color: var(--muted);
  font: 700 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
  letter-spacing: .18em;
  text-transform: uppercase;
}
h1 {
  margin: 4px 0 0;
  font-size: 24px;
  line-height: 1.18;
  letter-spacing: 0;
}
.stats {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  flex-wrap: wrap;
}
.stat {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  min-height: 32px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  padding: 6px 10px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
}
.stat::before {
  content: "";
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--subtle);
}
.stat.primary {
  border-color: rgba(20, 95, 86, .28);
  background: var(--accent-weak);
  color: var(--accent);
}
.stat.primary::before {
  background: var(--accent);
}
.app {
  max-width: 1500px;
  margin: 0 auto;
  padding: 22px 24px 64px;
  display: grid;
  grid-template-columns: minmax(420px, 690px) minmax(330px, 1fr) 310px;
  gap: 18px;
  align-items: start;
}
.stage-card, .detail-card, .rail-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  box-shadow: var(--shadow);
}
.stage-card { padding: 16px; }
.stage-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.stage-head strong { color: var(--accent); }
.stage-head span {
  color: var(--muted);
  font-size: 13px;
}
.stage {
  aspect-ratio: 3 / 4;
  width: min(100%, 540px);
  max-height: 72vh;
  margin: 0 auto;
  background: #ece5d8;
  border: 1px solid var(--line-strong);
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.stage img, .stage iframe, .stage video {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  background: #fffdf8;
}
.stage img, .stage video { object-fit: contain; }
.stage video { background: #101114; }
#clock {
  position: fixed;
  left: -9999px;
  top: 0;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}
.transport {
  margin-top: 15px;
  border-top: 1px solid #eee7df;
  padding-top: 14px;
}
.transport-row {
  display: grid;
  grid-template-columns: 74px minmax(280px, 1fr) 126px;
  gap: 10px;
  align-items: center;
}
#playButton { grid-column: 1; }
#scrubber { grid-column: 2; }
.transport button {
  height: 36px;
  border: 1px solid var(--accent);
  background: var(--accent);
  color: #fff;
  border-radius: 7px;
  font-weight: 700;
  cursor: pointer;
}
.range { width: 100%; accent-color: var(--accent); }
.time-readout {
  grid-column: 3;
  color: var(--muted);
  font: 12px ui-monospace, SFMono-Regular, Menlo, monospace;
  text-align: right;
}
.speed-group {
  grid-column: 2;
  grid-row: 2;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 4px;
}
.speed-group span, .volume span {
  color: var(--muted);
  font-size: 12px;
}
.speed-group button {
  height: 30px;
  min-width: 38px;
  padding: 0 7px;
  border-color: var(--line);
  background: var(--panel-2);
  color: var(--ink);
  font-size: 12px;
}
.speed-group button.active {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}
.volume {
  grid-column: 3;
  grid-row: 2;
  display: flex;
  gap: 6px;
  align-items: center;
  justify-content: flex-end;
}
.volume input { width: 54px; accent-color: var(--accent); }
.detail-card { padding: 18px 20px; }
.segment-meta {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  color: var(--muted);
  font-size: 13px;
}
.detail-card h2 {
  margin: 8px 0 10px;
  font-size: 25px;
  line-height: 1.18;
}
.task {
  border-left: 3px solid var(--accent);
  background: var(--accent-weak);
  color: var(--accent);
  padding: 10px 12px;
  margin: 13px 0 14px;
}
.fields {
  display: grid;
  grid-template-columns: 92px minmax(0, 1fr);
  gap: 8px 12px;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 12px 0;
}
.label { color: var(--muted); font-size: 13px; }
.cue {
  margin-top: 12px;
  padding: 9px 11px;
  border: 1px solid #ead9a6;
  background: #fff8dc;
  color: #6f4b16;
  border-radius: 7px;
}
.transcript h3 {
  margin: 16px 0 8px;
  color: var(--accent);
  font-size: 15px;
}
.transcript p {
  margin: 8px 0;
  line-height: 1.68;
}
.rail-card { padding: 14px; }
.rail-card h2 {
  margin: 0 0 12px;
  color: var(--muted);
  font-size: 13px;
}
.segment-list {
  display: grid;
  gap: 7px;
  max-height: calc(100vh - 190px);
  overflow: auto;
}
.segment-button {
  text-align: left;
  border: 1px solid var(--line);
  background: var(--panel-2);
  border-radius: 8px;
  padding: 9px 10px;
  cursor: pointer;
  display: grid;
  grid-template-columns: 32px minmax(0, 1fr);
  gap: 4px 8px;
}
.segment-button span {
  grid-row: 1 / 3;
  color: var(--accent);
  font-weight: 800;
  font-size: 13px;
}
.segment-button strong {
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.segment-button small {
  color: var(--muted);
  font: 11px ui-monospace, SFMono-Regular, Menlo, monospace;
}
.segment-button.active {
  border-color: var(--accent);
  background: var(--accent-weak);
  color: var(--accent);
}
@media (max-width: 1180px) {
  .app { grid-template-columns: 1fr 340px; }
  .rail-card { grid-column: 1 / -1; }
  .segment-list { grid-template-columns: repeat(2, minmax(0, 1fr)); max-height: none; }
}
@media (max-width: 820px) {
  .topbar-inner { align-items: flex-start; flex-direction: column; }
  .stats { justify-content: flex-start; }
  .app { grid-template-columns: 1fr; padding-left: 14px; padding-right: 14px; }
  .topbar-inner { padding-left: 14px; padding-right: 14px; }
  .transport-row { grid-template-columns: 72px minmax(0, 1fr); }
  .time-readout, .speed-group, .volume { grid-column: 1 / -1; grid-row: auto; }
  .speed-group { justify-content: flex-start; }
  .segment-list { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <div>
      <div class="kicker">TIMELINE PREVIEW · 口播时间线工作台</div>
      <h1>{{PROJECT_TITLE}} 时间线预览</h1>
    </div>
    <div class="stats">
      <span class="stat" id="segmentCount">-- 分镜段</span>
      <span class="stat primary" id="durationCount">-- 时长</span>
      <span class="stat" id="cueCount">-- 动画 cue</span>
      <span class="stat" id="sourceVideoCount">-- 段源片</span>
    </div>
  </div>
</header>
<main class="app">
  <section class="stage-card">
    <div class="stage-head"><strong id="stageLabel">画面轨</strong><span id="stageType">等待载入</span></div>
    <div class="stage" id="stage"></div>
    <div class="transport">
      <div class="transport-row">
        <button id="playButton" type="button">播放</button>
        <input class="range" id="scrubber" type="range" min="0" max="{{TOTAL_DURATION}}" step="0.01" value="0" aria-label="时间轴">
        <div class="time-readout" id="timeReadout">00:00:00.000 / 00:00:00.000</div>
        <div class="speed-group" aria-label="播放速度">
          <span>速度</span>
          <button type="button" data-rate="1" class="active">1x</button>
          <button type="button" data-rate="1.25">1.25x</button>
          <button type="button" data-rate="1.5">1.5x</button>
          <button type="button" data-rate="2">2x</button>
        </div>
        <label class="volume"><span>音量</span><input id="volume" type="range" min="0" max="1" step="0.01" value="1"></label>
      </div>
    </div>
    <video id="clock" preload="metadata" playsinline src="{{SOURCE_VIDEO}}"></video>
  </section>
  <section class="detail-card">
    <div class="segment-meta"><b id="segmentNo">Segment</b><span id="segmentTime">--</span></div>
    <h2 id="segmentTitle">载入中</h2>
    <div class="task" id="segmentTask"></div>
    <div class="fields">
      <div class="label">字幕</div><div class="value" id="segmentSubs"></div>
      <div class="label">画面类型</div><div class="value" id="segmentVisualType"></div>
      <div class="label">镜头动作</div><div class="value" id="segmentAction"></div>
    </div>
    <div class="cue" id="segmentCue"></div>
    <div class="transcript"><h3>完整口播</h3><div id="transcript"></div></div>
  </section>
  <aside class="rail-card"><h2>分镜目录</h2><div class="segment-list" id="segmentList"></div></aside>
</main>
<script>
const SOURCE_VIDEO = "{{SOURCE_VIDEO}}";
const SEGMENTS = {{SEGMENTS_JSON}};
const CUES = {{CUES_JSON}};
const TOTAL_DURATION = Number("{{TOTAL_DURATION}}");
const clock = document.getElementById('clock');
const stage = document.getElementById('stage');
const playButton = document.getElementById('playButton');
const scrubber = document.getElementById('scrubber');
const volume = document.getElementById('volume');
const timeReadout = document.getElementById('timeReadout');
const speedButtons = Array.from(document.querySelectorAll('.speed-group button'));
let activeSegmentId = null;
let activeStep = null;
let stageVideo = null;

function pad(n, w = 2) { return String(n).padStart(w, '0'); }
function fmt(sec) {
  const s = Math.max(0, Number(sec) || 0);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const ss = Math.floor(s % 60);
  const ms = Math.round((s - Math.floor(s)) * 1000);
  return `${pad(h)}:${pad(m)}:${pad(ss)}.${pad(ms, 3)}`;
}
function htmlEscape(value) {
  return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function getSegmentAt(time) {
  return SEGMENTS.find(seg => time >= seg.start && time < seg.end) || [...SEGMENTS].reverse().find(seg => time >= seg.start) || SEGMENTS[0];
}
function getCue(seg, time) {
  const cues = CUES[seg.id] || [];
  if (!cues.length) return null;
  const offset = Math.max(0, time - seg.start);
  return [...cues].reverse().find(cue => offset >= cue.offset) || cues[0];
}
function countCues() {
  return Object.values(CUES || {}).reduce((sum, cues) => sum + (Array.isArray(cues) ? cues.length : 0), 0);
}
function updateSummary() {
  document.getElementById('segmentCount').textContent = `${SEGMENTS.length} 分镜段`;
  document.getElementById('durationCount').textContent = `${fmt(TOTAL_DURATION)} 时长`;
  document.getElementById('cueCount').textContent = `${countCues()} 动画 cue`;
  document.getElementById('sourceVideoCount').textContent = `${SEGMENTS.filter(seg => seg.visual?.kind === 'video').length} 段源片`;
}
function renderVisual(seg) {
  if (activeSegmentId === seg.id) return;
  activeSegmentId = seg.id;
  activeStep = null;
  stageVideo = null;
  stage.innerHTML = '';
  stage.dataset.visualKind = seg.visual.kind;
  let el;
  if (seg.visual.kind === 'iframe') {
    el = document.createElement('iframe');
    el.src = seg.visual.src;
    el.loading = 'eager';
    el.addEventListener('load', () => sendStep(seg, clock.currentTime, true));
  } else if (seg.visual.kind === 'video') {
    el = document.createElement('video');
    el.src = SOURCE_VIDEO;
    el.muted = true;
    el.playsInline = true;
    el.preload = 'metadata';
    stageVideo = el;
    syncStageVideo(true);
  } else {
    el = document.createElement('img');
    el.src = seg.visual.src;
    el.alt = '';
  }
  stage.appendChild(el);
}
function syncStageVideo(force = false) {
  if (!stageVideo) return;
  stageVideo.playbackRate = clock.playbackRate;
  if (force || Math.abs((stageVideo.currentTime || 0) - clock.currentTime) > 0.18) {
    try { stageVideo.currentTime = clock.currentTime; } catch (_) {}
  }
  if (!clock.paused) stageVideo.play().catch(() => {});
  else stageVideo.pause();
}
function sendStep(seg, time, force = false) {
  const cue = getCue(seg, time);
  const cueBox = document.getElementById('segmentCue');
  if (!cue) {
    cueBox.textContent = '当前段落使用静态素材，跟随口播整段展示。';
    return;
  }
  cueBox.textContent = `当前动画节点：${cue.label}`;
  if (!force && cue.step === activeStep) return;
  activeStep = cue.step;
  const frame = stage.querySelector('iframe');
  if (frame && frame.contentWindow) frame.contentWindow.postMessage({ type: 'set-step', step: cue.step }, '*');
}
function updateDetails(seg) {
  document.getElementById('segmentNo').textContent = `Segment ${pad(seg.index)}`;
  document.getElementById('segmentTime').textContent = `${fmt(seg.start)} -> ${fmt(seg.end)}`;
  document.getElementById('segmentTitle').textContent = seg.title;
  document.getElementById('segmentTask').textContent = seg.task;
  document.getElementById('segmentSubs').textContent = seg.subtitles;
  document.getElementById('segmentVisualType').textContent = seg.type;
  document.getElementById('segmentAction').textContent = seg.action;
  const transcript = Array.isArray(seg.transcript) ? seg.transcript : [seg.transcript].filter(Boolean);
  document.getElementById('transcript').innerHTML = transcript.map(p => `<p>${htmlEscape(p)}</p>`).join('');
  document.getElementById('stageLabel').textContent = `${pad(seg.index)} · ${seg.title}`;
  document.getElementById('stageType').textContent = seg.type;
  document.querySelectorAll('.segment-button').forEach(btn => btn.classList.toggle('active', btn.dataset.segmentId === seg.id));
}
function tick() {
  const t = clock.currentTime || Number(scrubber.value) || SEGMENTS[0].start;
  const seg = getSegmentAt(t);
  renderVisual(seg);
  updateDetails(seg);
  sendStep(seg, t);
  syncStageVideo();
  scrubber.value = String(t);
  timeReadout.textContent = `${fmt(t)} / ${fmt(TOTAL_DURATION)}`;
}
function seekTo(time) {
  const t = Math.max(0, Math.min(TOTAL_DURATION, Number(time) || 0));
  clock.currentTime = t;
  scrubber.value = String(t);
  tick();
  return getTimelineState();
}
function setPlaybackRate(rate) {
  const nextRate = Number(rate) || 1;
  clock.playbackRate = nextRate;
  if (stageVideo) stageVideo.playbackRate = nextRate;
  speedButtons.forEach(btn => btn.classList.toggle('active', Number(btn.dataset.rate) === nextRate));
  return nextRate;
}
function getTimelineState() {
  const seg = getSegmentAt(clock.currentTime || Number(scrubber.value) || 0);
  const cue = getCue(seg, clock.currentTime || 0);
  return { time: clock.currentTime || 0, segment: seg.id, title: seg.title, visualKind: seg.visual.kind, cue: cue ? cue.label : null, playbackRate: clock.playbackRate };
}
function renderSegmentButtons() {
  document.getElementById('segmentList').innerHTML = SEGMENTS.map(seg => `
    <button class="segment-button" data-segment-id="${seg.id}" data-start="${seg.start}">
      <span>${pad(seg.index)}</span>
      <strong>${htmlEscape(seg.title)}</strong>
      <small>${fmt(seg.start)} - ${fmt(seg.end)}</small>
    </button>
  `).join('');
  document.querySelectorAll('.segment-button').forEach(btn => btn.addEventListener('click', () => seekTo(Number(btn.dataset.start))));
}

playButton.addEventListener('click', () => {
  if (clock.paused) clock.play().catch(() => {});
  else clock.pause();
});
clock.addEventListener('play', () => { playButton.textContent = '暂停'; syncStageVideo(true); });
clock.addEventListener('pause', () => { playButton.textContent = '播放'; syncStageVideo(true); });
clock.addEventListener('timeupdate', tick);
clock.addEventListener('loadedmetadata', () => { if (!clock.currentTime) seekTo(SEGMENTS[0].start); });
scrubber.addEventListener('input', () => seekTo(Number(scrubber.value)));
volume.addEventListener('input', () => { clock.volume = Number(volume.value); });
speedButtons.forEach(btn => btn.addEventListener('click', () => setPlaybackRate(btn.dataset.rate)));
window.seekTo = seekTo;
window.setPlaybackRate = setPlaybackRate;
window.getTimelineState = getTimelineState;
renderSegmentButtons();
updateSummary();
setPlaybackRate(1);
seekTo(SEGMENTS[0].start);
</script>
</body>
</html>
